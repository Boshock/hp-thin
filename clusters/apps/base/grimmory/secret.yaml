# SOPS-encrypted — DO NOT edit plaintext values here.
# To update: sops clusters/apps/base/grimmory/secret.yaml
#
# IMPORTANT: the grimmory chart deployment.yaml hardcodes:
#   secretKeyRef:
#     key: mariadb-password   <-- this exact key name is required
#
# The mariadb subchart also expects `mariadb-password` for the DB user password
# and `mariadb-root-password` for the root password.
#
# Required keys in this secret:
#   mariadb-password       -> DB user password (used by grimmory app + mariadb subchart)
#   mariadb-root-password  -> MariaDB root password (used by mariadb subchart)
#
# Encrypt: sops --encrypt --in-place clusters/apps/base/grimmory/secret.yaml
apiVersion: v1
kind: Secret
metadata:
  name: grimmory-secret
  namespace: grimmory
type: Opaque
stringData:
  mariadb-password: "REPLACE_AND_ENCRYPT"
  mariadb-root-password: "REPLACE_AND_ENCRYPT"
