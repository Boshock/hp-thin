# Grimmory app — ClusterIP (exposed via Ingress)
apiVersion: v1
kind: Service
metadata:
  name: grimmory
  namespace: grimmory
spec:
  ports:
    - port: 6060
      name: http
      protocol: TCP
  selector:
    app: grimmory
  type: ClusterIP
---
# MariaDB — internal only, not exposed outside namespace
apiVersion: v1
kind: Service
metadata:
  name: grimmory-mariadb
  namespace: grimmory
spec:
  ports:
    - port: 3306
      name: mysql
      protocol: TCP
  selector:
    app: grimmory-mariadb
  type: ClusterIP
