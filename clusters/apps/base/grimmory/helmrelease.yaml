apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: grimmory
  namespace: grimmory
spec:
  # Set to false when ready to run again
  suspend: true
  interval: 30m
  chart:
    spec:
      chart: deploy/helm/grimmory
      sourceRef:
        kind: GitRepository
        name: grimmory
        namespace: grimmory
      interval: 12h
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  driftDetection:
    mode: enabled
  values:
    fullnameOverride: grimmory

    image:
      repository: ghcr.io/grimmory-tools/grimmory
      tag: "v3.0.3"
      pullPolicy: IfNotPresent

    # MariaDB subchart (cloudpirates/mariadb:0.16.0)
    # NOTE: the grimmory deployment template hardcodes `key: mariadb-password`
    # in the DATABASE_PASSWORD secretKeyRef — secretKeys values are ignored.
    # The secret referenced by existingSecret MUST contain a key named
    # exactly `mariadb-password`. See secret.yaml.
    mariadb:
      enabled: true
      image:
        tag: 12.2.2
      auth:
        database: grimmory
        username: grimmory
        existingSecret: grimmory-secret
      service:
        port: 3306

    service:
      type: ClusterIP
      port: 6060

    ingress:
      enabled: false  # managed separately in staging overlay

    persistence:
      dataVolume:
        enabled: true
        size: 5Gi
      booksVolume:
        enabled: true
        size: 15Gi

    resources:
      requests:
        cpu: "200m"
        memory: "512Mi"
      limits:
        cpu: "1000m"
        memory: "1Gi"

    # startupProbe gates liveness/readiness until the JVM is fully up.
    # Spring Boot with 64 JPA repositories takes 3-5min on a thin client.
    # 10s x 36 = 6 minute max startup window before Kubernetes gives up.
    startupProbe:
      tcpSocket:
        port: http
      initialDelaySeconds: 30
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 36

    # These only run after startupProbe succeeds.
    livenessProbe:
      tcpSocket:
        port: http
      periodSeconds: 30
      timeoutSeconds: 10
      failureThreshold: 3

    readinessProbe:
      tcpSocket:
        port: http
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 3
