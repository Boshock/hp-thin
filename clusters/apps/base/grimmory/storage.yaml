# Grimmory application data (books metadata, config, user data)
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: grimmory-data
  namespace: grimmory
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
# Books storage — mount your book files here
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: grimmory-books
  namespace: grimmory
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 50Gi
---
# BookDrop watched folder for automatic ingestion
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: grimmory-bookdrop
  namespace: grimmory
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---
# MariaDB data
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: grimmory-mariadb-data
  namespace: grimmory
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
