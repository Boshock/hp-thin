# ============================================================
# MariaDB — backend database for Grimmory
# ============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grimmory-mariadb
  namespace: grimmory
  labels:
    app.kubernetes.io/name: grimmory-mariadb
    app.kubernetes.io/component: database
    app.kubernetes.io/part-of: grimmory
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: grimmory-mariadb
  template:
    metadata:
      labels:
        app: grimmory-mariadb
        app.kubernetes.io/name: grimmory-mariadb
        app.kubernetes.io/component: database
        app.kubernetes.io/part-of: grimmory
        policy-type: "db"
    spec:
      securityContext:
        fsGroup: 1000
        runAsUser: 1000
        runAsGroup: 1000
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: mariadb
          image: lscr.io/linuxserver/mariadb:11.4.10
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          env:
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
            - name: TZ
              valueFrom:
                configMapKeyRef:
                  name: grimmory-configmap
                  key: TZ
            - name: MYSQL_DATABASE
              value: "grimmory"
            - name: MYSQL_USER
              valueFrom:
                configMapKeyRef:
                  name: grimmory-configmap
                  key: DATABASE_USERNAME
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: grimmory-secret
                  key: MYSQL_PASSWORD
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: grimmory-secret
                  key: MYSQL_ROOT_PASSWORD
          ports:
            - containerPort: 3306
              name: mysql
              protocol: TCP
          livenessProbe:
            exec:
              command: ["mariadb-admin", "ping", "-h", "localhost"]
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            exec:
              command: ["mariadb-admin", "ping", "-h", "localhost"]
            initialDelaySeconds: 15
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          volumeMounts:
            - name: grimmory-mariadb-data
              mountPath: /config
      restartPolicy: Always
      volumes:
        - name: grimmory-mariadb-data
          persistentVolumeClaim:
            claimName: grimmory-mariadb-data
---
# ============================================================
# Grimmory — application
# ============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grimmory
  namespace: grimmory
  labels:
    app.kubernetes.io/name: grimmory
    app.kubernetes.io/component: server
    app.kubernetes.io/part-of: grimmory
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: grimmory
  template:
    metadata:
      labels:
        app: grimmory
        app.kubernetes.io/name: grimmory
        app.kubernetes.io/component: server
        app.kubernetes.io/part-of: grimmory
        policy-type: "app"
    spec:
      securityContext:
        fsGroup: 1000
        runAsUser: 1000
        runAsGroup: 1000
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: grimmory
          image: ghcr.io/grimmory-tools/grimmory:v3.0.3
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          envFrom:
            - configMapRef:
                name: grimmory-configmap
          env:
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: grimmory-secret
                  key: DATABASE_PASSWORD
          ports:
            - containerPort: 6060
              name: http
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /api/v1/healthcheck
              port: 6060
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/v1/healthcheck
              port: 6060
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 10
            failureThreshold: 3
          resources:
            requests:
              cpu: "200m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          volumeMounts:
            - name: grimmory-data
              mountPath: /app/data
            - name: grimmory-books
              mountPath: /books
            - name: grimmory-bookdrop
              mountPath: /bookdrop
      restartPolicy: Always
      volumes:
        - name: grimmory-data
          persistentVolumeClaim:
            claimName: grimmory-data
        - name: grimmory-books
          persistentVolumeClaim:
            claimName: grimmory-books
        - name: grimmory-bookdrop
          persistentVolumeClaim:
            claimName: grimmory-bookdrop
